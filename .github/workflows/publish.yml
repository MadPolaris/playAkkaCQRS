name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Publish to Sonatype
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          CI_RELEASE: publishSigned
        run: |
          # If PGP_SECRET is not already base64 encoded, sbt-ci-release might fail or use gpg.
          # sbt-ci-release 1.5.12+ handles armored keys if they are base64 encoded in the PGP_SECRET env var.
          # However, many users store the raw armored key in the secret.
          # We'll try to detect if it's base64 and encode if not, or just pass it through.
          # The most reliable way for sbt-ci-release is to have PGP_SECRET as base64(armored_key).
          if [[ "$PGP_SECRET" != *" "* && "$PGP_SECRET" == *"="* ]]; then
            echo "PGP_SECRET looks like it might already be base64 encoded."
          else
            echo "Encoding PGP_SECRET to base64..."
            export PGP_SECRET=$(printf "%s" "$PGP_SECRET" | base64 -w 0)
          fi
          sbt ci-release
